<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>점검일지 시스템</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    input[type="radio"] { transform: scale(1.3); cursor: pointer; }
    table { table-layout: fixed; width: 100%; min-width: 450px; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col text-gray-800">

  <header class="bg-white border-b sticky top-0 z-40 px-3 py-3 flex items-center justify-between shadow-xs">
    <button id="btn-back" onclick="goBack()" class="text-sm font-medium cursor-pointer" style="display: none;">← 이전</button>
    <h1 id="main-title" class="text-lg font-bold flex-1 text-center truncate px-2">점검일지</h1>
    <div id="save-group" class="hidden flex gap-1">
      <button onclick="submitData(false)" class="bg-blue-600 text-white px-2 py-1.5 rounded-md text-xs font-bold hover:bg-blue-700 cursor-pointer">저장</button>
      <button onclick="submitData(true)" class="bg-red-600 text-white px-2 py-1.5 rounded-md text-xs font-bold hover:bg-red-700 cursor-pointer">강제저장</button>
    </div>
  </header>

  <main class="flex-1 p-2 max-w-4xl w-full mx-auto">
    <div id="loading" class="flex flex-col justify-center items-center py-12">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
      <p class="text-xs text-gray-500 mt-2">구글 데이터 동기화 중...</p>
    </div>
    
    <div id="page-start" class="hidden space-y-3">
      <div class="bg-white p-5 border rounded-lg shadow-sm">
        <label class="block text-sm font-bold mb-2">점검자 선택</label>
        <select id="select-worker-name" class="w-full bg-white border-2 border-gray-400 rounded-md px-3 py-3 text-sm focus:border-blue-600 outline-none block"></select>
      </div>
      <button onclick="goToMain()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 cursor-pointer">다음으로 이동 →</button>
      
      <div class="bg-white p-5 border rounded-lg shadow-sm space-y-3 mt-4">
        <h2 class="text-sm font-bold text-red-600 border-b pb-2">데이터 다운로드</h2>
        
        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1">시작일</label>
            <input type="date" id="filter-start-date" class="w-full border p-2 rounded text-sm bg-white">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1">종료일</label>
            <input type="date" id="filter-end-date" class="w-full border p-2 rounded text-sm bg-white">
          </div>
        </div>

        <select id="filter-worker" class="w-full border p-2 rounded text-sm"><option value="">전체 점검자</option></select>
        <select id="filter-period" class="w-full border p-2 rounded text-sm"><option value="">전체 일지명</option></select>
        <select id="filter-line" class="w-full border p-2 rounded text-sm"><option value="">전체 라인명</option></select>
        <button onclick="downloadExcel()" class="w-full bg-red-600 text-white font-bold py-3 rounded-lg hover:bg-red-700 cursor-pointer">엑셀(CSV) 다운로드</button>
      </div>
    </div>

    <div id="page-main" class="hidden space-y-3"><div id="period-list" class="grid grid-cols-1 gap-3"></div></div>
    <div id="page-a" class="hidden space-y-3"><div id="line-list" class="grid grid-cols-1 gap-3"></div></div>
    <div id="page-b" class="hidden space-y-3 overflow-x-auto">
      <div class="bg-white shadow-xs border rounded-lg overflow-hidden">
        <table class="divide-y divide-gray-300">
          <thead class="bg-gray-100">
            <tr>
              <th class="w-[40px] py-2 text-[11px] font-bold text-gray-600">NO</th>
              <th class="py-2 text-[11px] font-bold text-gray-600 text-left px-2">항목</th>
              <th class="w-[55px] py-2 text-[11px] font-bold text-blue-700">이상X</th>
              <th class="w-[55px] py-2 text-[11px] font-bold text-red-600">이상O</th>
              <th class="w-[70px] py-2 text-[11px] font-bold text-gray-600">비고1</th>
              <th class="w-[70px] py-2 text-[11px] font-bold text-gray-600">비고2</th>
            </tr>
          </thead>
          <tbody id="inspection-table-body" class="divide-y divide-gray-200"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    // 구글 앱스 스크립트 웹앱 배포 주소가 반영되었습니다.
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwvK8DaGfhbK_Qw5nzWEbj1aroB-AECsxsHXzKaCZHtaevFKp0ITDwZkv-b2Lkvlo5s/exec";

    var serverData = { lines: [], items: [], workers: [] };
    var currentState = 'start', workerName = '', selectedPeriod = '', selectedLine = '', currentLineItems = [];

    window.onload = function() {
      if(GAS_WEB_APP_URL.includes("여기에")) {
        alert("🚨 코드 안의 GAS_WEB_APP_URL 주소를 실제 구글 웹앱 주소로 수정해야 작동합니다.");
        return;
      }
      
      fetch(`${GAS_WEB_APP_URL}?action=getSetupData`)
        .then(res => res.json())
        .then(d => {
          serverData = d;
          document.getElementById('loading').style.display='none';
          initFilters();
          renderPageStart();
        })
        .catch(err => {
          alert("데이터 로드 실패: 구글 앱스 스크립트 배포 상태 및 접근 권한 설정을 확인하세요.");
          console.error(err);
        });
    };

    function initFilters() {
      document.getElementById('filter-worker').innerHTML = '<option value="">전체 점검자</option>' + serverData.workers.map(w => `<option value="${w}">${w}</option>`).join('');
      
      var periods = [...new Set(serverData.lines.map(l => l.period))];
      document.getElementById('filter-period').innerHTML = '<option value="">전체 일지명</option>' + periods.map(p => `<option value="${p}">${p}</option>`).join('');
      
      var lines = [...new Set(serverData.lines.map(l => l.lineName))];
      document.getElementById('filter-line').innerHTML = '<option value="">전체 라인명</option>' + lines.map(l => `<option value="${l}">${l}</option>`).join('');
    }

    function downloadExcel() {
      var filter = {
        startDate: document.getElementById('filter-start-date').value,
        endDate: document.getElementById('filter-end-date').value,
        worker: document.getElementById('filter-worker').value,
        period: document.getElementById('filter-period').value,
        line: document.getElementById('filter-line').value
      };
      
      document.getElementById('loading').style.display='flex';
      
      fetch(`${GAS_WEB_APP_URL}?action=getFilteredData&filter=${encodeURIComponent(JSON.stringify(filter))}`)
        .then(res => res.json())
        .then(res => {
          document.getElementById('loading').style.display='none';
          if (res.error) { alert("오류 발생: " + res.error); return; }

          if (!res.success || res.count === 0) {
            var d = res.debug;
            var msg = "⚠️ 매칭 데이터 0건 진단 보고서\n\n";
            msg += "[내가 선택한 필터 조건]\n";
            msg += "- 시작일: " + (d.filter.startDate || "(지정안함)") + "\n";
            msg += "- 종료일: " + (d.filter.endDate || "(지정안함)") + "\n";
            msg += "- 점검자: " + (d.filter.worker || "(전체)") + "\n";
            msg += "- 일지명: " + (d.filter.period || "(전체)") + "\n";
            msg += "- 라인명: " + (d.filter.line || "(전체)") + "\n\n";
            msg += "[시트의 첫 번째 데이터 실제 값]\n";
            msg += "- A열 (날짜): " + (d.sampleRow[0] || "(비어있음)") + "\n";
            msg += "- B열 (점검자): " + (d.sampleRow[1] || "(비어있음)") + "\n";
            msg += "- C열 (일지명): " + (d.sampleRow[2] || "(비어있음)") + "\n";
            msg += "- D열 (라인명): " + (d.sampleRow[3] || "(비어있음)") + "\n\n";
            alert(msg);
            return;
          }
          
          var csvContent = "\uFEFF" + res.data.map(r => r.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(",")).join("\n");
          var blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a'); a.href = url; a.download = '점검결과.csv'; a.click();
        });
    }

    function updateHeader() { 
      document.getElementById('btn-back').style.display = (currentState === 'start') ? 'none' : 'block'; 
      document.getElementById('save-group').style.display = (currentState === 'b') ? 'flex' : 'none'; 
    }
    
    function renderPageStart() { currentState = 'start'; hideAll(); document.getElementById('page-start').style.display = 'block'; updateHeader(); document.getElementById('select-worker-name').innerHTML = serverData.workers.map(w => `<option value="${w}">${w}</option>`).join(''); }
    
    function renderPageMain() { currentState='main'; hideAll(); document.getElementById('page-main').style.display='block'; updateHeader(); var p = [...new Set(serverData.lines.map(l => l.period))]; document.getElementById('period-list').innerHTML = p.map(x => `<button class="p-4 bg-white border rounded font-bold shadow-xs active:bg-gray-100 cursor-pointer text-left" onclick="selectedPeriod='${x}'; renderPageA();">${x}</button>`).join(''); }
    
    function renderPageA() { currentState='a'; hideAll(); document.getElementById('page-a').style.display='block'; updateHeader(); document.getElementById('line-list').innerHTML = serverData.lines.filter(l => l.period === selectedPeriod).map(l => `<button class="p-4 bg-white border rounded font-bold shadow-xs active:bg-gray-100 cursor-pointer text-left" onclick="selectedLine='${l.lineName}'; renderPageB();">${l.lineName}</button>`).join(''); }
    
    function renderPageB() { currentState = 'b'; hideAll(); document.getElementById('page-b').style.display = 'block'; updateHeader(); var tbody = document.getElementById('inspection-table-body'); currentLineItems = serverData.items.filter(i => i.lineName === selectedLine); tbody.innerHTML = currentLineItems.map((item, idx) => `<tr class="hover:bg-gray-50"><td class="text-center text-[11px] font-bold py-3">${item.no}</td><td class="text-[12px] p-2 font-medium">${item.itemName}</td><td class="text-center"><input type="radio" name="r_${idx}" value="이상X"></td><td class="text-center"><input type="radio" name="r_${idx}" value="이상O"></td><td class="p-1"><input type="text" id="rem1_${idx}" class="w-full border rounded text-[11px] p-1 bg-white"></td><td class="p-1"><input type="text" id="rem2_${idx}" class="w-full border rounded text-[11px] p-1 bg-white"></td></tr>`).join(''); }
    
    function submitData(isForced) { 
      let unselected = []; 
      currentLineItems.forEach((item, idx) => { 
        if (!document.querySelector('input[name="r_'+idx+'"]:checked')) unselected.push(idx + 1); 
      }); 
      if (!isForced && unselected.length > 0) { 
        alert(unselected.join(", ") + "번째 항목이 선택되지 않았습니다."); 
        return; 
      } 
      
      var records = currentLineItems.map((item, idx) => ({ 
        worker: workerName, 
        period: selectedPeriod, 
        line: selectedLine, 
        no: item.no, 
        itemName: item.itemName, 
        result: document.querySelector('input[name="r_'+idx+'"]:checked')?.value || "미입력", 
        remark1: document.getElementById('rem1_'+idx).value, 
        remark2: document.getElementById('rem2_'+idx).value 
      })); 
      
      document.getElementById('loading').style.display='flex';
      
      fetch(GAS_WEB_APP_URL, {
        method: "POST",
        body: JSON.stringify(records)
      })
      .then(res => res.json())
      .then(res => {
        document.getElementById('loading').style.display='none';
        if(res.success) {
          alert("저장 완료"); 
          renderPageA(); 
        } else {
          alert("저장 실패: " + res.error);
        }
      }).catch(err => {
        document.getElementById('loading').style.display='none';
        alert("구글 서버와 통신 중 오류가 발생했습니다.");
      });
    }
    
    function hideAll() { ['page-start','page-main','page-a','page-b'].forEach(id => document.getElementById(id).style.display='none'); }
    function goToMain() { workerName = document.getElementById('select-worker-name').value; renderPageMain(); }
    function goBack() { if(currentState==='b') renderPageA(); else if(currentState==='a') renderPageMain(); else if(currentState==='main') renderPageStart(); updateHeader(); }
  </script>
</body>
</html>
